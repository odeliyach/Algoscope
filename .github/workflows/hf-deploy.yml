name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build React frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deploy@github-actions.com"
          git config --global user.name "GitHub Actions"

          # יצירת ענף חדש ונקי לצורך הפריסה בלבד
          git checkout --orphan hf-deploy

          # הסרת קבצים שלא נרצה ב-HuggingFace (כמו תיקיית assets גדולה)
          git rm -rf assets/ 2>/dev/null || true

          # החלפת ה-README בכזה שכולל את ה-Metadata של HuggingFace
          if [ -f README_HF.md ]; then
            cp README_HF.md README.md
            git rm --cached README_HF.md 2>/dev/null || true
            rm README_HF.md
          fi

          # הוספת קבצי ה-Build (חובה להוסיף אותם בכוח כי הם ב-gitignore)
          git add -f frontend/dist/
          git add .

          # הסרת קבצי המקור של ה-Frontend כדי לחסוך מקום ב-Space
          git rm -r --cached frontend/src/ 2>/dev/null || true
          git rm -r --cached frontend/node_modules/ 2>/dev/null || true

          git commit -m "Deploy to HuggingFace Spaces"

          # הגדרת ה-Remote וביצוע ה-Push
          # WHY add||set-url: git remote add fails with exit 129 if the remote
          # already exists from a previous run. This pattern is idempotent:
          # add succeeds on a fresh runner; set-url updates it on a warm one.
          git remote add space https://odeliyach:$HF_TOKEN@huggingface.co/spaces/odeliyach/Algoscope 2>/dev/null \
            || git remote set-url space https://odeliyach:$HF_TOKEN@huggingface.co/spaces/odeliyach/Algoscope
          git push space hf-deploy:main --force

name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build React frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deploy@github-actions.com"
          git config --global user.name "GitHub Actions"

          mkdir /tmp/hf-deploy
          cp Dockerfile requirements.txt pyproject.toml README_HF.md /tmp/hf-deploy/
          cp -r app/ /tmp/hf-deploy/app/
          cp -r frontend/dist/ /tmp/hf-deploy/frontend/dist/
          mv /tmp/hf-deploy/README_HF.md /tmp/hf-deploy/README.md

          cd /tmp/hf-deploy
          git init
          git add .
          git commit -m "Deploy to HuggingFace Spaces"
          git push https://odeliyach:$HF_TOKEN@huggingface.co/spaces/odeliyach/Algoscope main --force

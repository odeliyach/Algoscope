name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # WHY set git identity: GitHub Actions runners have no git user
          # configured by default. Without this, any git commit fails.
          git config --global user.email "deploy@github-actions.com"
          git config --global user.name "GitHub Actions"

          # WHY a separate branch: HF blocks PNG/binary files unless using
          # Git LFS. We push a clean branch without assets/ to HF.
          git checkout -b hf-deploy
          git rm -r --cached assets/ 2>/dev/null || true
          git commit -m "Remove assets for HF deploy" --allow-empty
          git remote add space https://odeliyach:$HF_TOKEN@huggingface.co/spaces/odeliyach/Algoscope
          git push space hf-deploy:main --force

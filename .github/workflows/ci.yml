# WHY GitHub Actions CI: catches broken imports and syntax errors before
# they reach HuggingFace Spaces. Runs on every push to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Install clang-format (if needed)
        if: hashFiles('**/*.c', '**/*.h') != ''
        run: sudo apt-get install -y clang-format

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip downloads — speeds up subsequent runs significantly
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Python lint (ruff)
        run: ruff check app/ dashboard.py tests/

      - name: C style (clang-format)
        run: |
          files=$(find . -name "*.c" -o -name "*.h")
          if [ -z "$files" ]; then
            echo "No C sources found; skipping clang-format."
            exit 0
          fi
          clang-format --version
          find . -name "*.c" -o -name "*.h" -print0 | xargs -0 clang-format --dry-run --Werror

      # WHY check imports before running tests: a missing __init__.py or
      # circular import will cause a cryptic error in Spaces. This catches it early.
      - name: Check all modules import cleanly
        run: |
          python -c "from app.model import ToxicityClassifier"
          python -c "from app.database import get_recent_posts, save_post"
          python -c "from app.graph import build_cooccurrence_graph"
          python -c "from app.ingestion import ALGOSPEAK_QUERIES"

      # WHY syntax check dashboard separately: Streamlit apps can't be imported
      # like modules — use ast.parse to verify syntax without executing.
      - name: Check dashboard syntax
        run: python -c "import ast; ast.parse(open('dashboard.py').read()); print('OK')"

      - name: Run tests with coverage
        env:
          # Provide dummy credentials so .env-dependent code doesn't crash
          BLUESKY_HANDLE: "test@test.com"
          BLUESKY_PASSWORD: "testpassword"
        run: |
          # Track coverage for both the FastAPI app code and the Streamlit dashboard entrypoint
          python -m pytest tests/ -v --tb=short --cov=app --cov=dashboard.py --cov-report=xml

      - name: Collect lcov coverage
        id: lcov
        run: |
          if find . -name "*.gcda" -o -name "*.gcno" | grep -q .; then
            # Keep --ignore-errors unused to avoid lcov exit code 25 (lcov raises it when trace files are missing for sources, expected when no C/Unity coverage is produced)
            lcov --capture --directory . --output-file coverage.info --ignore-errors unused --no-external
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "No gcda/gcno files found; skipping lcov capture."
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python
          fail_ci_if_error: false

      - name: Upload C coverage to Codecov
        if: steps.lcov.outputs.generated == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: c
          fail_ci_if_error: false

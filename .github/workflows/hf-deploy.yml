name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deploy@github-actions.com"
          git config --global user.name "GitHub Actions"

          # WHY orphan branch: HF scans full git history for binary files.
          # Removing files from the branch is not enough — they still exist
          # in previous commits. An orphan branch has no history at all,
          # so HF never sees the PNG files.
          git checkout --orphan hf-deploy

          # Remove assets folder from this clean snapshot
          git rm -rf assets/ 2>/dev/null || true

          # Stage everything else
          git add .
          git commit -m "Deploy to HuggingFace Spaces"

          git remote add space https://odeliyach:$HF_TOKEN@huggingface.co/spaces/odeliyach/Algoscope
          git push space hf-deploy:main --force

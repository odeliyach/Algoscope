name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # WHY a separate branch: HF blocks PNG/binary files unless using
          # Git LFS. We create a clean branch with only app code (no assets/)
          # and push that to HF. The GitHub repo keeps the full history
          # including screenshots — HF only gets what it needs to run.
          git checkout -b hf-deploy
          git rm -r --cached assets/ 2>/dev/null || true
          git commit -m "Remove assets for HF deploy" --allow-empty
          git remote add space https://odeliyach:$HF_TOKEN@huggingface.co/spaces/odeliyach/Algoscope
          git push space hf-deploy:main --force

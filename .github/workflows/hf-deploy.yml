name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build React frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deploy@github-actions.com"
          git config --global user.name "GitHub Actions"

          git checkout --orphan hf-deploy

          git rm -rf assets/ 2>/dev/null || true

          if [ -f README_HF.md ]; then
            cp README_HF.md README.md
            git rm --cached README_HF.md 2>/dev/null || true
            rm README_HF.md
          fi

          git add -f frontend/dist/
          git add .

          git rm -r --cached frontend/src/ 2>/dev/null || true
          git rm -r --cached frontend/node_modules/ 2>/dev/null || true

          git commit -m "Deploy to HuggingFace Spaces"

          # WHY push directly to URL instead of using a named remote:
          # git checkout --orphan creates a branch with a clean .git/config —
          # no remotes exist. Both `git remote add` and `git remote set-url`
          # fail with "No such remote" because there is nothing to update.
          # Pushing directly to the HTTPS URL skips the remote registry entirely.
          git push https://odeliyach:$HF_TOKEN@huggingface.co/spaces/odeliyach/Algoscope hf-deploy:main --force
